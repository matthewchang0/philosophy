<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Account · Pantheon</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="account">
    <div id="app-layout" class="app-shell layout-shell sidebar-collapsed">
      <div class="main-shell main-shell-full">
        <header class="topbar topbar-detail">
          <a href="/" class="home-button" aria-label="Go to Pantheon home">
            <img src="/logo.svg" alt="" class="home-button-icon" />
          </a>
          <div class="topbar-spacer"></div>
          <nav id="top-links" class="top-links">
            <a href="/login">Log in</a>
            <a href="/signup">Sign up</a>
            <a href="/pricing">Pricing</a>
            <a href="/privacy">Privacy Policy</a>
          </nav>
        </header>
        <main class="auth-stage">
          <section id="account-panel" class="auth-card">
            <p class="eyebrow">Account</p>
            <h1>Your Pantheon account</h1>
            <div id="account-content" class="account-content"></div>
            <form id="password-form" class="auth-form password-form">
              <h2 class="account-subhead">Change password</h2>
              <label class="field">
                <span>Current password</span>
                <input id="current-password" type="password" autocomplete="current-password" required />
              </label>
              <label class="field">
                <span>New password</span>
                <input id="new-password" type="password" autocomplete="new-password" required />
              </label>
              <label class="field">
                <span>Confirm new password</span>
                <input id="confirm-password" type="password" autocomplete="new-password" required />
              </label>
              <div id="password-error" class="error-banner hidden"></div>
              <button id="password-submit" class="secondary-button" type="submit">Update password</button>
            </form>
          </section>
        </main>
      </div>
    </div>
    <script src="/app.js" defer></script>
  </body>
</html>
