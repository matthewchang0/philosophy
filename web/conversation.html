<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pantheon Conversation</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="conversation">
    <div id="app-layout" class="app-shell layout-shell sidebar-collapsed">
      <div class="main-shell main-shell-full">
        <header class="topbar topbar-detail">
          <a href="/" class="home-button" aria-label="Go to Pantheon home">
            <img src="/logo.svg" alt="" class="home-button-icon" />
          </a>

          <div class="topbar-spacer"></div>

          <nav id="top-links" class="top-links">
            <a href="/">New conversation</a>
          </nav>
        </header>

        <main class="detail-stage">
          <section class="detail-shell">
            <div id="detail-empty-state" class="empty-state hidden">
              <p class="eyebrow">Conversation</p>
              <h2>This Pantheon session could not be found.</h2>
              <p>Open a different thread from the sidebar, or return home to start a new one.</p>
            </div>

            <div id="conversation-view" class="conversation-view hidden">
              <header class="conversation-header conversation-header-stacked">
                <div class="title-wrap title-wrap-wide">
                  <p id="conversation-status-line" class="eyebrow">Conversation</p>
                  <h1 id="conversation-title" class="detail-title detail-title-centered"></h1>
                </div>
                <div class="header-actions">
                  <span id="status-pill" class="status-pill">idle</span>
                  <button id="resume-button" class="secondary-button hidden" type="button">Resume</button>
                </div>
              </header>

              <div id="config-chips" class="config-chips config-chips-centered"></div>
              <div id="participants-stage" class="participants-stage participants-stage-centered"></div>
              <div id="error-banner" class="error-banner hidden"></div>

              <section id="transcript-stage" class="transcript-stage transcript-feed"></section>
              <section id="summary-stage" class="summary-stage hidden"></section>
            </div>
          </section>
        </main>
        <footer class="site-footer">
          <div class="site-footer-inner">
            <div class="site-footer-brand">
              <strong>Pantheon</strong>
              <span>Copyright © 2026 Pantheon</span>
            </div>
            <nav class="site-footer-links" aria-label="Footer">
              <a href="/company">Company</a>
              <a href="/privacy">Privacy Policy</a>
              <a href="/contact">Contact</a>
              <a href="/pricing">Pricing</a>
            </nav>
            <div class="site-footer-meta">
              <span>English (US)</span>
            </div>
          </div>
        </footer>
      </div>
    </div>

    <script src="/app.js" defer></script>
  </body>
</html>
